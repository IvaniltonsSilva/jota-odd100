    <script>
    // Função para animar a Odd
    function animateOdd() {
        const display = document.getElementById('multiplier');
        let current = 1.00;
        const target = 100.00;
        const duration = 3500; // Tempo em milissegundos
        const startTime = performance.now();

        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // Ease-out para desacelerar no final e dar suspense
            const easeOut = 1 - Math.pow(1 - progress, 3);
            current = 1 + (target - 1) * easeOut;

            display.innerText = current.toFixed(2);

            if (progress < 1) {
                requestAnimationFrame(update);
            } else {
                display.innerText = "100.00";
                display.style.color = "#ff0000"; // Fica vermelho no final
            }
        }
        requestAnimationFrame(update);
    }

    // Inicia a animação quando a página carrega
    window.onload = animateOdd;
